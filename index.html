<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#d8e1e4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Say So Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #101214;
        --muted: #6f7478;
        --faint: #a7adb2;
        --line: rgba(16, 18, 20, 0.1);
        --panel: rgba(255, 255, 255, 0.78);
        --panel-solid: #f8f8f6;
        --accent: #7f9caf;
        --accent-soft: rgba(127, 156, 175, 0.2);
        --accent-strong: #2c5870;
        --shadow: 0 24px 70px rgba(65, 83, 96, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: #d8e1e4;
      }

      body {
        position: relative;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        touch-action: manipulation;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        z-index: 0;
        inset: 0;
        width: 100vw;
        min-height: 100vh;
        min-height: 100dvh;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 0%, rgba(123, 157, 177, 0.56), transparent 36rem),
          linear-gradient(180deg, #d8e1e4 0%, #faf9f6 52%, #ffffff 100%);
      }

      body.intro-active .app {
        opacity: 0;
        pointer-events: none;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        appearance: none;
        border: 0;
        color: inherit;
        cursor: pointer;
        font: inherit;
        touch-action: manipulation;
      }

      .opening-screen {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #ffffff;
        color: var(--ink);
        opacity: 1;
        transition:
          opacity 620ms ease,
          visibility 620ms ease;
      }

      .opening-screen.is-dismissed {
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .opening-title {
        max-width: min(560px, 100%);
        margin: 0;
        color: rgba(16, 18, 20, 0.82);
        font-family: "Gentium Book Plus", Georgia, serif;
        font-size: clamp(34px, 9vw, 54px);
        font-weight: 400;
        letter-spacing: 0;
        line-height: 1.08;
        text-align: center;
      }

      .opening-book {
        display: inline;
        padding: 0 0 0.05em;
        background: transparent;
        color: var(--ink);
        font: inherit;
        text-decoration-line: underline;
        text-decoration-thickness: 0.055em;
        text-underline-offset: 0.12em;
      }

      .opening-book.is-hidden,
      .opening-punctuation.is-hidden {
        display: none;
      }

      .opening-book:focus-visible {
        outline: 2px solid rgba(44, 88, 112, 0.42);
        outline-offset: 5px;
      }

      .opening-cursor {
        display: inline-block;
        width: 0.45em;
        margin-left: 0.02em;
        color: rgba(16, 18, 20, 0.72);
        animation: openingCursorBlink 900ms steps(1, end) infinite;
      }

      .opening-break {
        display: block;
        height: 0;
      }

      @keyframes openingCursorBlink {
        50% {
          opacity: 0;
        }
      }

      .app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: minmax(0, 2fr) minmax(216px, 1fr);
        width: min(100vw, 480px);
        min-height: 100svh;
        margin: 0 auto;
        overflow: hidden;
        touch-action: manipulation;
      }

      .app.is-compact {
        grid-template-rows: minmax(0, 1fr) auto;
      }

      @supports (view-transition-name: none) {
        .stage {
          view-transition-name: reader-stage;
        }

        .translation {
          view-transition-name: translation-dock;
        }

        .translation-copy {
          view-transition-name: english-copy;
        }

        .progress-wrap {
          view-transition-name: reading-progress;
        }

        .controls {
          view-transition-name: playback-controls;
        }

        ::view-transition-group(reader-stage),
        ::view-transition-group(translation-dock),
        ::view-transition-group(english-copy),
        ::view-transition-group(reading-progress),
        ::view-transition-group(playback-controls) {
          animation-duration: 360ms;
          animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        ::view-transition-old(root),
        ::view-transition-new(root) {
          animation-duration: 220ms;
          animation-timing-function: ease-out;
        }
      }

      .reader {
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: max(28px, env(safe-area-inset-top)) 22px 18px;
      }

      .book-chip-wrap {
        position: relative;
        z-index: 5;
        width: fit-content;
        max-width: 100%;
        margin: 0 auto;
      }

      .book-chip {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;
        width: fit-content;
        max-width: 100%;
        margin: 0;
        padding: 8px 13px 8px 8px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
        color: rgba(16, 18, 20, 0.74);
        font-size: 13px;
        font-weight: 650;
        letter-spacing: 0;
        box-shadow: 0 10px 34px rgba(75, 96, 110, 0.1);
        backdrop-filter: blur(18px);
        overflow: visible;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          box-shadow 120ms ease,
          transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .book-chip:active {
        transform: translateY(1px);
      }

      .book-chip.is-flashing {
        border-color: rgba(255, 255, 255, 0.96);
        background: rgba(255, 255, 255, 0.62);
        box-shadow:
          0 14px 38px rgba(75, 96, 110, 0.16),
          0 0 0 1px rgba(255, 255, 255, 0.5);
        transform: scale(1.045);
      }

      .book-add-badge {
        position: absolute;
        top: 50%;
        right: -25px;
        display: block;
        color: rgba(16, 18, 20, 0.48);
        font-size: 12px;
        font-weight: 860;
        line-height: 1;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-50%);
      }

      .book-chip.is-showing-add .book-add-badge {
        animation: bookAddBadgeRise 680ms ease-out forwards;
      }

      .book-pill-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        width: 224px;
        padding: 6px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 22px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.58)),
          rgba(255, 255, 255, 0.74);
        box-shadow: 0 14px 34px rgba(51, 74, 87, 0.2);
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -8px) scale(0.84);
        transform-origin: top center;
        transition:
          opacity 180ms ease,
          transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
        backdrop-filter: blur(22px);
      }

      .book-chip-wrap.is-menu-open {
        z-index: 20;
      }

      .book-chip-wrap.is-menu-open .book-pill-menu {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, 0) scale(1);
      }

      .book-menu-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 11px 12px;
        border-radius: 16px;
        background: transparent;
        color: rgba(16, 18, 20, 0.78);
        font-size: 15px;
        font-weight: 650;
        text-align: left;
      }

      .book-menu-item:active {
        background: rgba(16, 18, 20, 0.06);
        transform: translateY(1px);
      }

      .book-menu-item .lucide {
        width: 18px;
        height: 18px;
        flex: 0 0 24px;
        stroke-width: 2.6;
      }

      .book-menu-divider {
        height: 1px;
        margin: 0 12px;
        background: rgba(255, 255, 255, 0.44);
      }

      .book-menu-translation {
        display: grid;
        gap: 8px;
        padding: 11px 12px;
      }

      .book-menu-books {
        display: grid;
        gap: 6px;
        padding: 11px 12px;
      }

      .book-menu-books .book-menu-item {
        padding: 9px 10px;
        font-size: 14px;
      }

      .book-menu-item.is-current {
        background: rgba(127, 156, 175, 0.18);
        color: var(--ink);
      }

      .book-menu-layout {
        display: grid;
        gap: 8px;
        padding: 11px 12px;
      }

      .book-menu-read-aloud {
        display: grid;
        gap: 8px;
        padding: 11px 12px;
      }

      .book-menu-setting-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .book-menu-label {
        color: rgba(16, 18, 20, 0.48);
        font-size: 11px;
        font-weight: 760;
        letter-spacing: 0.08em;
        line-height: 1;
        text-transform: uppercase;
      }

      .book-menu-translation .translation-mode {
        width: 100%;
      }

      .book-menu-translation .translation-mode button {
        flex: 1;
      }

      .layout-mode {
        display: inline-flex;
        gap: 2px;
        width: 100%;
        padding: 2px;
        border-radius: 999px;
        background: rgba(16, 18, 20, 0.06);
      }

      .layout-mode button {
        flex: 1;
        min-width: 0;
        padding: 7px 8px;
        border-radius: 999px;
        background: transparent;
        color: rgba(16, 18, 20, 0.48);
        font-size: 11px;
        font-weight: 760;
        line-height: 1;
      }

      .layout-mode button.is-primary {
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        box-shadow: 0 4px 14px rgba(16, 18, 20, 0.08);
      }

      .read-aloud-mode {
        display: inline-flex;
        gap: 2px;
        width: 100%;
        padding: 2px;
        border-radius: 999px;
        background: rgba(16, 18, 20, 0.06);
      }

      .read-aloud-mode button {
        flex: 1;
        min-width: 0;
        padding: 7px 8px;
        border-radius: 999px;
        background: transparent;
        color: rgba(16, 18, 20, 0.48);
        font-size: 11px;
        font-weight: 760;
        line-height: 1;
      }

      .read-aloud-mode button.is-primary {
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        box-shadow: 0 4px 14px rgba(16, 18, 20, 0.08);
      }

      .read-repeat-button {
        min-width: 34px;
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(16, 18, 20, 0.08);
        color: rgba(16, 18, 20, 0.62);
        font-size: 11px;
        font-weight: 820;
        line-height: 1;
      }

      .read-repeat-button:active {
        transform: translateY(1px);
      }

      @keyframes bookAddBadgeRise {
        0% {
          opacity: 1;
          transform: translateY(-50%);
        }

        72% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          transform: translateY(calc(-50% - 18px));
        }
      }

      .book-icon {
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: inset 0 -8px 18px rgba(7, 23, 32, 0.28);
      }

      .stage {
        display: flex;
        flex: 1;
        flex-direction: column;
        justify-content: center;
        min-height: 0;
        padding: 18px 0 14px;
      }

      .app.is-compact .stage {
        flex: 1 1 auto;
        padding-bottom: 8px;
      }

      .app.is-compact .reader {
        padding-bottom: 10px;
      }

      .words {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 5px 3px;
        max-width: 390px;
        margin: 0 auto;
        text-align: center;
      }

      .word {
        display: inline-grid;
        place-items: center;
        min-height: 48px;
        padding: 3px 4px 5px;
        border-radius: 10px;
        background: transparent;
        color: rgba(16, 18, 20, 0.72);
        font-family: "Gentium Book Plus", Georgia, serif;
        font-size: clamp(31px, 9.2vw, 43px);
        font-weight: 400;
        letter-spacing: 0;
        line-height: 1.05;
        transition:
          color 180ms ease,
          font-weight 180ms ease;
      }

      .word::before,
      .word-text {
        grid-area: 1 / 1;
      }

      .word::before {
        content: attr(data-word);
        font-weight: 700;
        visibility: hidden;
      }

      .word-text {
        font: inherit;
      }

      .word.is-read {
        color: rgba(16, 18, 20, 0.42);
      }

      .word.is-current {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.46);
        box-shadow: inset 0 -0.12em 0 rgba(127, 156, 175, 0.38);
      }

      .word.is-current .word-text {
        font-weight: 700;
      }

      .word.is-selected {
        color: var(--ink);
      }

      .word-tooltip {
        position: absolute;
        z-index: 4;
        top: 0;
        left: 50%;
        max-width: min(240px, calc(100vw - 44px));
        padding: 7px 10px;
        border-radius: 10px;
        background: rgba(12, 14, 16, 0.94);
        box-shadow: 0 14px 34px rgba(16, 18, 20, 0.26);
        color: rgba(255, 255, 255, 0.94);
        font-size: 12px;
        font-weight: 640;
        line-height: 1.2;
        opacity: 0;
        pointer-events: none;
        text-align: center;
        transform: translate(-50%, 3px) scale(0.98);
        transition:
          opacity 280ms ease-out,
          transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
        white-space: normal;
        will-change: opacity, transform;
      }

      .word-tooltip.is-open {
        opacity: 1;
        transform: translate(-50%, 0) scale(1);
      }

      .progress-wrap {
        margin-top: auto;
      }

      .progress {
        height: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(16, 18, 20, 0.09);
      }

      .progress span {
        display: block;
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--ink);
        transition: width 220ms ease;
      }

      .mini-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
        color: rgba(16, 18, 20, 0.45);
        font-size: 13px;
        font-weight: 600;
      }

      .remaining-button {
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        font-weight: inherit;
        text-align: right;
      }

      .remaining-button:active {
        transform: translateY(1px);
      }

      .remaining-button:focus-visible {
        border-radius: 6px;
        outline: 2px solid rgba(44, 88, 112, 0.36);
        outline-offset: 4px;
      }

      .translation {
        display: grid;
        grid-template-rows: minmax(34px, auto) minmax(0, 1fr) auto;
        min-height: 0;
        padding: 20px 22px max(16px, env(safe-area-inset-bottom));
        border-top: 1px solid rgba(16, 18, 20, 0.08);
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 -22px 64px rgba(126, 143, 153, 0.13);
        backdrop-filter: blur(22px);
      }

      .app.is-compact .translation {
        grid-template-rows: auto auto;
        gap: 10px;
        padding: 11px 22px max(12px, env(safe-area-inset-bottom));
      }

      .translation-copy {
        display: grid;
        min-height: 0;
        place-items: center;
        text-align: center;
      }

      .app.is-compact .stage > .translation-copy {
        flex: 0 0 auto;
        max-width: 390px;
        margin: 14px auto 0;
        place-items: center;
      }

      .app.is-compact .translation-label {
        display: none;
      }

      .app.is-compact .progress-wrap {
        margin-top: 0;
      }

      .app.is-compact .mini-meta {
        margin-top: 7px;
        font-size: 12px;
      }

      .translation-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: rgba(16, 18, 20, 0.44);
        font-size: 12px;
        font-weight: 760;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .translation-mode {
        display: inline-flex;
        gap: 2px;
        padding: 2px;
        border-radius: 999px;
        background: rgba(16, 18, 20, 0.06);
        letter-spacing: 0;
        text-transform: none;
      }

      .translation-mode button {
        min-width: 42px;
        padding: 5px 8px;
        border-radius: 999px;
        background: transparent;
        color: rgba(16, 18, 20, 0.48);
        font-size: 11px;
        font-weight: 760;
        line-height: 1;
      }

      .translation-mode button.is-selected {
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        box-shadow: 0 4px 14px rgba(16, 18, 20, 0.08);
      }

      .translation-mode button:disabled {
        cursor: default;
        opacity: 0.42;
      }

      .translation p {
        margin: 0;
        color: rgba(16, 18, 20, 0.66);
        font-size: clamp(17px, 4.3vw, 22px);
        font-weight: 520;
        letter-spacing: 0;
        line-height: 1.16;
        text-align: center;
      }

      .translation p.is-long {
        font-size: clamp(14px, 3.4vw, 18px);
        line-height: 1.14;
      }

      .translation p.is-very-long {
        font-size: clamp(12px, 3vw, 15px);
        line-height: 1.12;
      }

      .app.is-compact .stage > .translation-copy p {
        color: rgba(16, 18, 20, 0.46);
        font-size: clamp(23px, 6.1vw, 30px);
        font-weight: 430;
      }

      .app.is-compact .stage > .translation-copy p.is-long {
        font-size: clamp(19px, 4.8vw, 25px);
      }

      .app.is-compact .stage > .translation-copy p.is-very-long {
        font-size: clamp(17px, 4.2vw, 22px);
      }

      .controls {
        position: relative;
        display: grid;
        grid-template-columns: 52px 68px 52px;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-top: 18px;
      }

      .app.is-compact .controls {
        margin-top: 0;
      }

      .control {
        display: grid;
        place-items: center;
        background: transparent;
        color: var(--ink);
        font-weight: 800;
      }

      .skip {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        color: rgba(16, 18, 20, 0.72);
      }

      .play {
        --countdown-progress: 0deg;
        position: relative;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: var(--ink);
        box-shadow: 0 17px 32px rgba(16, 18, 20, 0.18);
        overflow: visible;
      }

      .play::before {
        position: absolute;
        inset: -7px;
        border-radius: inherit;
        background: conic-gradient(var(--ink) var(--countdown-progress), rgba(16, 18, 20, 0.1) 0deg);
        content: "";
        opacity: 0;
        transition: opacity 160ms ease;
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
        mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
      }

      .play.is-waiting {
        background: rgba(16, 18, 20, 0.74);
      }

      .play.is-waiting::before {
        opacity: 1;
      }

      .play > .lucide {
        position: relative;
        z-index: 1;
      }

      .speed {
        position: absolute;
        top: 50%;
        left: calc(50% + 104px);
        transform: translateY(-50%);
        width: 50px;
        height: 38px;
        border-radius: 999px;
        background: rgba(16, 18, 20, 0.06);
        color: rgba(16, 18, 20, 0.62);
        font-size: 15px;
        font-weight: 760;
      }

      .continuous {
        position: absolute;
        top: 50%;
        right: calc(50% + 104px);
        transform: translateY(-50%);
        width: 50px;
        height: 38px;
        border-radius: 999px;
        background: rgba(16, 18, 20, 0.06);
        color: rgba(16, 18, 20, 0.62);
        overflow: visible;
      }

      .continuous.is-selected {
        background: var(--ink);
        color: rgba(255, 255, 255, 0.94);
      }

      .continuous .lucide {
        width: 18px;
        height: 18px;
      }

      .continuous-delay {
        position: absolute;
        top: -5px;
        right: -6px;
        display: none;
        min-width: 23px;
        height: 16px;
        place-items: center;
        border: 1px solid rgba(16, 18, 20, 0.1);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 5px 14px rgba(16, 18, 20, 0.16);
        color: var(--ink);
        font-size: 9px;
        font-weight: 840;
        line-height: 1;
      }

      .continuous.has-delay .continuous-delay {
        display: grid;
      }

      .lucide {
        width: 26px;
        height: 26px;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.4;
      }

      .play .lucide {
        width: 30px;
        height: 30px;
        color: white;
        fill: none;
      }

      .play .pause-icon {
        display: none;
      }

      .play.is-playing .play-icon {
        display: none;
      }

      .play.is-playing .pause-icon {
        display: block;
      }

      .voice-sheet {
        position: absolute;
        inset: 0;
        z-index: 8;
        display: grid;

          if (now - lastTouchEndAt < 320) event.preventDefault();
          lastTouchEndAt = now;
        },
        { passive: false },
      );

        appEl.addEventListener(eventName, (event) => event.preventDefault());
      });

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));

      async function typeOpeningTitle() {
        const text = "Hi Meishar, let's read ";
        const bookTitle = currentBookTitle;
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (reducedMotion) {
          openingTypedText.textContent = "Hi Meishar, let's";
          openingTypedText.appendChild(document.createElement("span")).className = "opening-break";
          openingTypedText.append(" read ");
          openingBookText.textContent = bookTitle;
          openingBook.classList.remove("is-hidden");
          openingPunctuation.classList.remove("is-hidden");
          return;
        }

        openingTypedText.textContent = "";
        openingBookText.textContent = "";
        openingBook.classList.add("is-hidden");
        openingPunctuation.classList.add("is-hidden");
        await sleep(380);

        let insertedOpeningBreak = false;
        for (const character of text) {
          if (insertedOpeningBreak && character === " ") {
            insertedOpeningBreak = false;
            continue;
          }
          openingTypedText.append(character);
          if (openingTypedText.textContent === "Hi Meishar, let's") {
            openingTypedText.appendChild(document.createElement("span")).className = "opening-break";
            insertedOpeningBreak = true;
            await sleep(120);
          } else if (character === ",") {
            await sleep(420);
          } else if (character === " ") {
            await sleep(76);
          } else {
            await sleep(42 + Math.random() * 54);
          }
        }

        await sleep(130);
        openingBook.classList.remove("is-hidden");
        for (const character of bookTitle) {
          openingBookText.textContent += character;
          await sleep(character === " " ? 82 : 46 + Math.random() * 48);
        }
        await sleep(180);
        openingPunctuation.classList.remove("is-hidden");
      }

      function applyReaderLayout(layout) {
        const isCompact = layout === "compact";
        appEl.classList.toggle("is-compact", isCompact);
        standardLayoutButton.classList.toggle("is-primary", !isCompact);
        compactLayoutButton.classList.toggle("is-primary", isCompact);
        standardLayoutButton.setAttribute("aria-pressed", String(!isCompact));
        compactLayoutButton.setAttribute("aria-pressed", String(isCompact));

        if (isCompact) {
          stageEl.appendChild(translationCopy);

        } else {

      function currentReaderLayout() {

      function prefersReducedMotion() {
        return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      }

      function animateReaderLayoutFallback(layout) {
        const movingElements = [translationCopy, progressWrap, controlsEl].filter(Boolean);
        const firstRows = [
          readerEl.getBoundingClientRect().height,
          translationSection.getBoundingClientRect().height,
        ];
        const firstRects = new Map(
          movingElements.map((element) => [element, element.getBoundingClientRect()]),
        );

        movingElements.forEach((element) => {
          element.getAnimations().forEach((animation) => animation.cancel());
        });

        applyReaderLayout(layout);

        const lastRows = [
          readerEl.getBoundingClientRect().height,
          translationSection.getBoundingClientRect().height,
        ];
        const lastRects = new Map(
          movingElements.map((element) => [element, element.getBoundingClientRect()]),
        );

        appEl.style.transition = "none";
        appEl.style.gridTemplateRows = `${firstRows[0]}px ${firstRows[1]}px`;
        void appEl.offsetHeight;
        appEl.style.transition = "grid-template-rows 360ms cubic-bezier(0.2, 0.8, 0.2, 1)";

        requestAnimationFrame(() => {
          appEl.style.gridTemplateRows = `${lastRows[0]}px ${lastRows[1]}px`;
        });

        window.setTimeout(() => {
          appEl.style.transition = "";
          appEl.style.gridTemplateRows = "";
        }, 390);

        movingElements.forEach((element) => {
          const first = firstRects.get(element);
          const last = lastRects.get(element);
          if (!first || !last) return;
          const deltaX = first.left - last.left;
          const deltaY = first.top - last.top;
          if (Math.abs(deltaX) < 0.5 && Math.abs(deltaY) < 0.5) return;
          element.animate(
            [
              { transform: `translate(${deltaX}px, ${deltaY}px)` },
              { transform: "translate(0, 0)" },
            ],
            {
              duration: 360,
              easing: "cubic-bezier(0.2, 0.8, 0.2, 1)",
            },
          );
        });
      }

      function setReaderLayout(layout, options = {}) {
        const nextLayout = layout === "standard" ? "standard" : "compact";
        const shouldAnimate =
          options.animate &&
          currentReaderLayout() !== nextLayout &&
          !prefersReducedMotion() &&
          !document.body.classList.contains("intro-active");

        if (!shouldAnimate) {
          applyReaderLayout(nextLayout);
          return;
        }

        if (document.startViewTransition) {
          document.startViewTransition(() => applyReaderLayout(nextLayout));
          return;
        }

        animateReaderLayoutFallback(nextLayout);
      }

        const fallbackUrl = `index.html?book=${bookId}&manifest=chapter-001.json`;

      function cleanWord(word) {

      function formatDuration(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${String(seconds).padStart(2, "0")}`;

      function fallbackElapsedMs(index = segmentIndex) {

      function segmentStartMs(index = segmentIndex) {
        return typeof segments[index]?.startMs === "number" ? segments[index].startMs : fallbackElapsedMs(index);
      }

      function segmentEndMs(index = segmentIndex) {
        if (typeof segments[index]?.endMs === "number") return segments[index].endMs;
        return segmentStartMs(index) + 8000;
      }

      function readableDurationMs() {
        return totalDurationMs || segments.length * 8000;
      }

      function updateProgressFromElapsed(elapsedMs) {

        const clampedElapsed = Math.max(0, Math.min(duration, elapsedMs));

      function findHistorySegment(entry) {
        if (entry?.segmentId) {
          const byId = segments.find((segment) => segment.id === entry.segmentId);
          if (byId) return byId;
        }
        return segments.find((segment) => segment.de === entry?.phrase) || null;
      }

      function historyWordIndex(entry, segment) {
        const words = getWords(segment);
        if (Number.isInteger(entry?.wordIndex) && entry.wordIndex >= 0 && entry.wordIndex < words.length) {
          return entry.wordIndex;
        }
        const normalizedWord = cleanWord(entry?.word || "").toLocaleLowerCase();
        return words.findIndex((word) => cleanWord(word).toLocaleLowerCase() === normalizedWord);
      }

      function sentenceTranslationFor(entry, segment) {
        return entry?.sentenceTranslation || (segment ? activeTranslation(segment) : "");
      }

      function appendSentenceWithHighlight(container, sentence, word, wordIndex) {
        const parts = sentence.split(/\s+/).filter(Boolean);
        const normalizedWord = cleanWord(word || "").toLocaleLowerCase();
        let highlighted = false;

        parts.forEach((part, index) => {
          if (index > 0) container.append(" ");
          const shouldHighlight =
            index === wordIndex ||
            (!highlighted && cleanWord(part).toLocaleLowerCase() === normalizedWord);
          const node = document.createElement("span");
          node.textContent = part;
          if (shouldHighlight) {
            node.className = "word-history-word";
            highlighted = true;
          }
          container.appendChild(node);
        });
      }

      function rememberTappedWord(word, note, segment, wordIndex) {
        const translation = note[1] || "Translation note will appear here.";
        const label = note[0] || "word";
        const normalizedWord = cleanWord(word).toLocaleLowerCase();
        const sentenceTranslation = activeTranslation(segment);
        const nextEntry = {
          word: cleanWord(word),
          translation,
          label,
          phrase: segment.de,
          sentenceTranslation,
          sentenceTranslationMode: translationMode,
          segmentId: segment.id,
          wordIndex,
          tappedAt: Date.now(),
        };
        const sameTap = (entry) =>
          entry.word.toLocaleLowerCase() === normalizedWord &&
          entry.segmentId === segment.id &&
          entry.wordIndex === wordIndex;

        wordHistory = [nextEntry, ...wordHistory.filter((entry) => !sameTap(entry))].slice(0, WORD_HISTORY_LIMIT);
        saveWordHistory();
        renderWordHistory();
      }

      function resolveBookPath(path) {
        return path ? `${BOOK_DIR}/${path}` : "";
      }

      async function loadPageManifest() {
        try {
          const response = await fetch(PAGE_MANIFEST_URL);
          if (!response.ok) throw new Error(`Page manifest failed: ${response.status}`);
          const manifest = await response.json();
          currentBookTitle = manifest.title || BOOK_ID;
          document.title = `${currentBookTitle} | Say So Reader`;
          bookChipLabel.textContent = currentBookTitle;
          bookIcon.style.display = "";
          if (manifest.icon) {
            bookIcon.src = resolveBookPath(manifest.icon);
          } else if (currentBookFallback.icon) {
            bookIcon.src = currentBookFallback.icon;
          } else if (BOOK_ID !== "moby-dick") {
            bookIcon.style.display = "none";
          }
          cachedVoiceId = manifest.selected_voice_id || "";
          const narrationChunks = Object.fromEntries(
            (manifest.narration_chunks || []).map((chunk) => [chunk.id, chunk]),
          );
          const readingUnits = manifest.reading_units || manifest.chunks || [];

          segments.splice(
            0,
            segments.length,
            ...readingUnits.map((unit) => {
              const narrationChunk = narrationChunks[unit.narration_chunk_id] || unit;
              return {
                id: unit.id,
                narrationChunkId: unit.narration_chunk_id || narrationChunk.id || unit.id,
                de: unit.display_text,
                en: unit.en,
                enAi: unit.en_ai || "",
                notes: unit.notes || {},
                audio: resolveBookPath(narrationChunk.audio || unit.audio),
                timing: resolveBookPath(narrationChunk.timing || unit.timing),
              };
            }),
          );
          segmentIndex = loadReadingPosition(segments.length - 1);

          hydrateSegmentTimings().catch((error) => console.warn(error));

          if (cachedVoiceId) {
            selectedVoiceId = cachedVoiceId;
            window.localStorage.setItem("sayso.voiceId", selectedVoiceId);
            updateVoiceChip();
          }

          if (!isPlaying) render();
        } catch (error) {
          console.warn(error);
        }
      }

      function activeTranslation(segment) {
        if (translationMode === "ai" && segment.enAi) return segment.enAi;
        return segment.en || segment.enAi || "";
      }

      function updateTranslationModeButtons() {
        const bookAvailable = segments.some((segment) => segment.en);
        const aiAvailable = segments.some((segment) => segment.enAi);
        if (translationMode === "ai" && !aiAvailable) translationMode = "book";
        if (translationMode === "book" && !bookAvailable && aiAvailable) translationMode = "ai";

        bookTranslationButton.classList.toggle("is-selected", translationMode === "book");
        aiTranslationButton.classList.toggle("is-selected", translationMode === "ai");
        bookTranslationButton.setAttribute("aria-pressed", String(translationMode === "book"));
        aiTranslationButton.setAttribute("aria-pressed", String(translationMode === "ai"));
        bookTranslationButton.disabled = !bookAvailable;
        aiTranslationButton.disabled = !aiAvailable;
      }

      function setTranslationMode(mode) {
        translationMode = mode;
        window.localStorage.setItem("sayso.translationMode", translationMode);
        updateTranslationModeButtons();
        render();
      }

      async function hydrateSegmentTimings() {
        const timingPaths = [];
        segments.forEach((segment) => {
          if (segment.timing && !timingPaths.includes(segment.timing)) {
            timingPaths.push(segment.timing);
          }
        });

        let timingOffsetMs = 0;
        for (const timingPath of timingPaths) {
          const timing = await loadSegmentTiming({ timing: timingPath });
          const units = timing?.reading_units || [];
          const unitDuration = units.reduce((max, unit) => Math.max(max, unit.end_ms || 0), 0);
          const wordDuration = (timing?.words || []).reduce((max, word) => Math.max(max, word.end_ms || 0), 0);
          const timingDurationMs = Math.max(unitDuration, wordDuration);

          units.forEach((unit) => {
            const segment = segments.find((candidate) => candidate.id === unit.id && candidate.timing === timingPath);
            if (!segment || typeof unit.start_ms !== "number") return;
            segment.startMs = timingOffsetMs + unit.start_ms;
            segment.endMs = timingOffsetMs + (typeof unit.end_ms === "number" ? unit.end_ms : unit.start_ms);
            segment.timingOffsetMs = timingOffsetMs;
          });

          timingOffsetMs += timingDurationMs;
        }

        totalDurationMs = timingOffsetMs;
        if (!isPlaying) render();
      }

      function render() {
        const segment = segments[segmentIndex];
        const words = getWords(segment);

        wordsEl.innerHTML = "";
        words.forEach((word, index) => {
          const button = document.createElement("button");
          button.className = "word";
          button.type = "button";
          button.dataset.word = word;
          const text = document.createElement("span");
          text.className = "word-text";
          text.textContent = word;
          button.appendChild(text);
          button.setAttribute("aria-label", `Learn ${cleanWord(word)}`);
          button.addEventListener("click", () => showLearning(index, button));
          wordsEl.appendChild(button);
        });

        const translation = activeTranslation(segment);
        translationEl.textContent = translation;
        translationEl.classList.toggle("is-long", translation.length > 86);
        translationEl.classList.toggle("is-very-long", translation.length > 150);
        segmentCountEl.textContent = `${segmentIndex + 1} / ${segments.length}`;
        const remainingCount = segments.length - segmentIndex - 1;
        remainingEl.textContent = `${remainingCount} phrase${remainingCount === 1 ? "" : "s"} left`;
        remainingEl.setAttribute("aria-label", `Open contents, ${remainingEl.textContent}`);
        updateProgressFromElapsed(segmentStartMs(segmentIndex));
        currentWordIndex = -1;
        selectedWordIndex = null;
        hideTooltip();
        updateTranslationModeButtons();
        updateWordClasses();
      }

      function updateWordClasses() {
        [...wordsEl.children].forEach((node, index) => {
          node.classList.toggle("is-read", index < currentWordIndex);
          node.classList.toggle("is-current", index === currentWordIndex);
          node.classList.toggle("is-selected", index === selectedWordIndex);
        });
      }

      function hideTooltip() {
        window.clearTimeout(tooltipTimer);
        wordTooltip.classList.remove("is-open");
      }

      function dismissTooltip() {
        selectedWordIndex = null;
        hideTooltip();
        updateWordClasses();
      }

      function showLearning(index, button) {
        closeBookMenu();
        const segment = segments[segmentIndex];
        const word = getWords(segment)[index];
        const key = cleanWord(word);
        const note = segment.notes[key] || ["word", "Translation note will appear here."];
        rememberTappedWord(word, note, segment, index);
        triggerBookPillFeedback();

        selectedWordIndex = index;
        const wasOpen = wordTooltip.classList.contains("is-open");
        wordTooltip.classList.remove("is-open");
        window.clearTimeout(tooltipTimer);

        tooltipTimer = window.setTimeout(() => {
          wordTooltip.textContent = note[1];

          const readerRect = readerEl.getBoundingClientRect();
          const wordRect = button.getBoundingClientRect();
          const tooltipRect = wordTooltip.getBoundingClientRect();
          const halfTooltip = tooltipRect.width / 2;
          const center = wordRect.left - readerRect.left + wordRect.width / 2;
          const left = Math.max(halfTooltip + 4, Math.min(readerRect.width - halfTooltip - 4, center));
          const top = Math.max(12, wordRect.top - readerRect.top - tooltipRect.height - 10);

          wordTooltip.style.left = `${left}px`;
          wordTooltip.style.top = `${top}px`;
          void wordTooltip.offsetWidth;
          requestAnimationFrame(() => wordTooltip.classList.add("is-open"));
        }, wasOpen ? 170 : 0);

        updateWordClasses();
      }

      appEl.addEventListener("pointerdown", (event) => {
        if (bookChipWrap.classList.contains("is-menu-open") && !event.target.closest(".book-chip-wrap")) {
          closeBookMenu();
        }
        if (wordTooltip.classList.contains("is-open")) {
          if (event.target.closest(".word") || event.target.closest(".word-tooltip")) return;
          dismissTooltip();
        }
      });

      function clearPlayDelayFeedback() {
        window.cancelAnimationFrame(countdownFrame);
        countdownFrame = null;
        playButton.classList.remove("is-waiting");
        playButton.style.removeProperty("--countdown-progress");
      }

      function startPlayDelayFeedback(delayMs, ariaLabel = "Waiting before next phrase") {
        const startedAt = performance.now();
        clearPlayDelayFeedback();
        playButton.style.setProperty("--countdown-progress", "360deg");
        playButton.classList.add("is-waiting");
        playButton.setAttribute("aria-label", ariaLabel);

        function tick(now) {
          const progress = Math.min(1, (now - startedAt) / delayMs);
          playButton.style.setProperty("--countdown-progress", `${(1 - progress) * 360}deg`);
          if (progress < 1 && isPlaying) {
            countdownFrame = window.requestAnimationFrame(tick);
          }
        }

        countdownFrame = window.requestAnimationFrame(tick);
      }

      function stopPlayback() {
        playbackToken += 1;
        window.clearTimeout(playbackTimer);
        window.cancelAnimationFrame(audioFrame);
        clearPlayDelayFeedback();
        playbackTimer = null;
        audioFrame = null;
        audioPlayer.pause();
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
        isSpeakingEnglishTranslation = false;
        currentSegmentReadPass = 1;
        isPlaying = false;
        playButton.classList.remove("is-playing");
        playButton.setAttribute("aria-label", "Play phrase");
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      }

      function pausePlayback() {
        playbackToken += 1;
        window.clearTimeout(playbackTimer);
        window.cancelAnimationFrame(audioFrame);
        clearPlayDelayFeedback();
        playbackTimer = null;
        audioFrame = null;
        audioPlayer.pause();
        isSpeakingEnglishTranslation = false;
        currentSegmentReadPass = 1;
        isPlaying = false;
        playButton.classList.remove("is-playing");
        playButton.setAttribute("aria-label", "Play phrase");
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      }

      function finishSingleSegmentPlayback() {
        playbackToken += 1;
        window.clearTimeout(playbackTimer);
        window.cancelAnimationFrame(audioFrame);
        clearPlayDelayFeedback();
        playbackTimer = null;
        audioFrame = null;
        audioPlayer.pause();
        isSpeakingEnglishTranslation = false;
        currentSegmentReadPass = 1;
        isPlaying = false;
        currentWordIndex = -1;
        playButton.classList.remove("is-playing");
        playButton.setAttribute("aria-label", "Play phrase");
        updateWordClasses();
        updateProgressFromElapsed(segmentStartMs(segmentIndex));
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      }

      function getWordRanges(text, words) {
        let cursor = 0;
        return words.map((word) => {
          const start = text.indexOf(word, cursor);
          const safeStart = start === -1 ? cursor : start;
          cursor = safeStart + word.length;
          return { start: safeStart, end: cursor };
        });
      }

      function setCurrentWord(index, elapsedMs = null) {
        const words = getWords(segments[segmentIndex]);
        currentWordIndex = Math.max(0, Math.min(words.length - 1, index));
        updateWordClasses();
        const phraseProgress = (currentWordIndex + 1) / words.length;
        const fallbackProgressMs =
          segmentStartMs(segmentIndex) + (segmentEndMs(segmentIndex) - segmentStartMs(segmentIndex)) * phraseProgress;
        updateProgressFromElapsed(elapsedMs ?? fallbackProgressMs);
      }

      async function continueWithinCurrentAudio(token) {
        const segment = segments[segmentIndex];
        const words = getWords(segment);

        try {
          const timing = await loadSegmentTiming(segment);
          const unitTiming = timingForSegment(timing, segment);
          if (!unitTiming || !isPlaying || token !== playbackToken) return;
          syncWordsFromAudio(words, unitTiming, token);
        } catch (error) {
          console.warn(error);
          playCurrentSegment();
        }
      }

      function finishCurrentSegment(token) {
        if (!isPlaying || token !== playbackToken) return;
        if (isSpeakingEnglishTranslation) return;

        if (shouldReadEnglishAloud()) {
          playEnglishTranslationThenFinish(token);
          return;
        }

        completeCurrentSegment(token);
      }

      function shouldReadEnglishAloud() {
        return (
          readAloudMode === "both" &&
          "speechSynthesis" in window &&
          Boolean(activeTranslation(segments[segmentIndex]).trim())
        );
      }

      function playEnglishTranslationThenFinish(token) {
        const translation = activeTranslation(segments[segmentIndex]).trim();
        if (!translation) {
          completeCurrentSegment(token);
          return;
        }

        isSpeakingEnglishTranslation = true;
        window.clearTimeout(playbackTimer);
        window.cancelAnimationFrame(audioFrame);
        clearPlayDelayFeedback();
        playbackTimer = null;
        audioFrame = null;
        audioPlayer.pause();
        currentWordIndex = -1;
        selectedWordIndex = null;
        hideTooltip();
        updateWordClasses();
        updateProgressFromElapsed(segmentEndMs(segmentIndex));

        const utterance = new SpeechSynthesisUtterance(translation);
        utterance.lang = "en-US";
        utterance.rate = 0.9 * playbackSpeed;
        utterance.pitch = 1;
        const finish = () => {
          if (token !== playbackToken) return;
          isSpeakingEnglishTranslation = false;
          completeCurrentSegment(token);
        };
        utterance.onend = finish;
        utterance.onerror = finish;
        window.speechSynthesis.speak(utterance);
      }

      function completeCurrentSegment(token) {
        if (!isPlaying || token !== playbackToken) return;

        if (currentSegmentReadPass < readRepeatCount) {
          currentSegmentReadPass += 1;
          scheduleCurrentSegmentReread(token);
          return;
        }

        if (continuousMode === "off") {
          finishSingleSegmentPlayback();
          return;
        }

        if (segmentIndex < segments.length - 1) {
          const currentSegment = segments[segmentIndex];
          const nextSegment = segments[segmentIndex + 1];
          const canContinueCurrentAudio =
            currentSegment.audio &&
            nextSegment.audio &&
            currentSegment.audio === nextSegment.audio &&
            currentSegment.timing === nextSegment.timing &&
            !audioPlayer.paused &&
            !audioPlayer.ended;

          const delayMs = continuousDelayMs();
          if (delayMs) {
            audioPlayer.pause();
            startPlayDelayFeedback(delayMs);
            playbackTimer = window.setTimeout(() => {
              if (!isPlaying || token !== playbackToken) return;
              segmentIndex += 1;
              currentSegmentReadPass = 1;
              saveReadingPosition();
              render();
              playCurrentSegment();
            }, delayMs);
          } else {
            segmentIndex += 1;
            currentSegmentReadPass = 1;
            saveReadingPosition();
            render();
            if (canContinueCurrentAudio) {
              continueWithinCurrentAudio(token);
            } else {
              playCurrentSegment();
            }
          }
          return;
        }

        progressFill.style.width = "100%";
        stopPlayback();
      }

      function replayCurrentSegment() {
        window.clearTimeout(playbackTimer);
        window.cancelAnimationFrame(audioFrame);
        clearPlayDelayFeedback();
        playbackTimer = null;
        audioFrame = null;
        audioPlayer.pause();
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        isSpeakingEnglishTranslation = false;
        currentWordIndex = -1;
        selectedWordIndex = null;
        hideTooltip();
        updateWordClasses();
        updateProgressFromElapsed(segmentStartMs(segmentIndex));
        playCurrentSegment({ preserveReadPass: true });
      }

      function scheduleCurrentSegmentReread(token) {
        window.clearTimeout(playbackTimer);
        window.cancelAnimationFrame(audioFrame);
        audioFrame = null;
        audioPlayer.pause();
        startPlayDelayFeedback(REREAD_DELAY_MS, "Waiting before rereading phrase");
        playbackTimer = window.setTimeout(() => {
          if (!isPlaying || token !== playbackToken) return;
          replayCurrentSegment();
        }, REREAD_DELAY_MS);
      }

      async function loadSegmentTiming(segment) {
        if (!segment.timing) return null;
        if (segmentTimingCache.has(segment.timing)) return segmentTimingCache.get(segment.timing);

        const response = await fetch(segment.timing);
        if (!response.ok) throw new Error(`Timing failed: ${response.status}`);
        const timing = await response.json();
        segmentTimingCache.set(segment.timing, timing);
        return timing;
      }

      function timingForSegment(timing, segment) {
        if (!timing) return null;
        if (!timing.reading_units) return timing;
        return timing.reading_units.find((unit) => unit.id === segment.id) || null;
      }

      function syncWordsFromAudio(words, unitTiming, token) {
        if (!isPlaying || token !== playbackToken) return;

        const elapsedMs = audioPlayer.currentTime * 1000;
        const absoluteElapsedMs = (segments[segmentIndex]?.timingOffsetMs || 0) + elapsedMs;
        updateProgressFromElapsed(absoluteElapsedMs);
        if (typeof unitTiming.end_ms === "number" && elapsedMs >= unitTiming.end_ms - 12) {
          finishCurrentSegment(token);
          return;
        }

        const timings = unitTiming.words || [];
        let wordIndex = -1;
        for (let index = 0; index < timings.length; index += 1) {
          const timing = timings[index];
          if (elapsedMs + 24 >= timing.start_ms) wordIndex = index;
          if (elapsedMs < timing.start_ms) break;
        }

        if (wordIndex !== -1 && wordIndex !== currentWordIndex) {
          setCurrentWord(Math.min(wordIndex, words.length - 1), absoluteElapsedMs);
        }

        audioFrame = window.requestAnimationFrame(() => syncWordsFromAudio(words, unitTiming, token));
      }

      function waitForAudioEvent(eventName, timeoutMs = 1500) {
        return new Promise((resolve, reject) => {
          const cleanup = () => {
            window.clearTimeout(timer);
            audioPlayer.removeEventListener(eventName, handleEvent);
            audioPlayer.removeEventListener("error", handleError);
          };
          const handleEvent = () => {
            cleanup();
            resolve();
          };
          const handleError = () => {
            cleanup();
            reject(audioPlayer.error || new Error("Audio load failed"));
          };
          const timer = window.setTimeout(() => {
            cleanup();
            resolve();
          }, timeoutMs);

          audioPlayer.addEventListener(eventName, handleEvent, { once: true });
          audioPlayer.addEventListener("error", handleError, { once: true });
        });
      }

      async function seekAudioTo(seconds) {
        const targetSeconds = Math.max(0, seconds || 0);
        if (audioPlayer.readyState < 1) {
          await waitForAudioEvent("loadedmetadata", 2500);
        }
        if (audioPlayer.readyState < 1) return false;

        if (Math.abs(audioPlayer.currentTime - targetSeconds) <= 0.04) return true;

        for (let attempt = 0; attempt < 3; attempt += 1) {
          const seeked = waitForAudioEvent("seeked", 1500);
          if (typeof audioPlayer.fastSeek === "function") {
            audioPlayer.fastSeek(targetSeconds);
          } else {
            audioPlayer.currentTime = targetSeconds;
          }
          if (audioPlayer.seeking) await seeked;
          if (Math.abs(audioPlayer.currentTime - targetSeconds) <= 0.08) return true;
        }

        return Math.abs(audioPlayer.currentTime - targetSeconds) <= 0.18;
      }

      function waitForHistoryAudioEvent(eventName, timeoutMs = 1500) {
        return new Promise((resolve, reject) => {
          const cleanup = () => {
            window.clearTimeout(timer);
            historyAudioPlayer.removeEventListener(eventName, handleEvent);
            historyAudioPlayer.removeEventListener("error", handleError);
          };
          const handleEvent = () => {
            cleanup();
            resolve();
          };
          const handleError = () => {
            cleanup();
            reject(historyAudioPlayer.error || new Error("Audio load failed"));
          };
          const timer = window.setTimeout(() => {
            cleanup();
            resolve();
          }, timeoutMs);

          historyAudioPlayer.addEventListener(eventName, handleEvent, { once: true });
          historyAudioPlayer.addEventListener("error", handleError, { once: true });
        });
      }

      async function seekHistoryAudioTo(seconds) {
        const targetSeconds = Math.max(0, seconds || 0);
        if (historyAudioPlayer.readyState < 1) {
          await waitForHistoryAudioEvent("loadedmetadata", 2500);
        }
        if (historyAudioPlayer.readyState < 1) return false;

        if (Math.abs(historyAudioPlayer.currentTime - targetSeconds) <= 0.04) return true;

        for (let attempt = 0; attempt < 3; attempt += 1) {
          const seeked = waitForHistoryAudioEvent("seeked", 1500);
          if (typeof historyAudioPlayer.fastSeek === "function") {
            historyAudioPlayer.fastSeek(targetSeconds);
          } else {
            historyAudioPlayer.currentTime = targetSeconds;
          }
          if (historyAudioPlayer.seeking) await seeked;
          if (Math.abs(historyAudioPlayer.currentTime - targetSeconds) <= 0.08) return true;
        }

        return Math.abs(historyAudioPlayer.currentTime - targetSeconds) <= 0.18;
      }

      async function playHistoryPreview(segment) {
        if (!segment.audio || !segment.timing) return;
        historyPlaybackToken += 1;
        const token = historyPlaybackToken;
        historyAudioPlayer.pause();

        try {
          const timing = await loadSegmentTiming(segment);
          const unitTiming = timingForSegment(timing, segment);
          if (!unitTiming || token !== historyPlaybackToken) return;

          const audioUrl = new URL(segment.audio, window.location.href).href;
          if (historyAudioPlayer.src !== audioUrl) {
            historyAudioPlayer.src = segment.audio;
            historyAudioPlayer.load();
          }

          const startSeconds = Math.max(0, (unitTiming.start_ms || 0) / 1000);
          const endSeconds =
            typeof unitTiming.end_ms === "number"
              ? Math.max(startSeconds, unitTiming.end_ms / 1000)
              : startSeconds + 2.5;
          historyAudioPlayer.playbackRate = playbackSpeed;
          historyAudioPlayer.onended = null;
          historyAudioPlayer.ontimeupdate = () => {
            if (token !== historyPlaybackToken) return;
            if (historyAudioPlayer.currentTime >= endSeconds - 0.015) {
              historyAudioPlayer.pause();
              historyAudioPlayer.ontimeupdate = null;
            }
          };

          if (historyAudioPlayer.readyState >= 1) await seekHistoryAudioTo(startSeconds);
          await historyAudioPlayer.play();
          if (Math.abs(historyAudioPlayer.currentTime - startSeconds) > 0.18) {
            await seekHistoryAudioTo(startSeconds);
          }
          if (historyAudioPlayer.currentTime >= endSeconds - 0.015) {
            historyAudioPlayer.pause();
            historyAudioPlayer.ontimeupdate = null;
          }
        } catch (error) {
          console.warn(error);
        }
      }

      async function playCachedSegment(words, token) {
        const segment = segments[segmentIndex];
        if (!segment.audio || !segment.timing) return false;
        if (cachedVoiceId && selectedVoiceId && selectedVoiceId !== cachedVoiceId) return false;

        try {
          const timing = await loadSegmentTiming(segment);
          const unitTiming = timingForSegment(timing, segment);
          const wordTimings = (unitTiming?.words || []).filter((word) => typeof word.start_ms === "number");
          if (!unitTiming || !wordTimings.length) return false;
          if (!isPlaying || token !== playbackToken) return true;

          const audioUrl = new URL(segment.audio, window.location.href).href;
          const isSameAudio = audioPlayer.src === audioUrl;
          const elapsedMs = audioPlayer.currentTime * 1000;
          const targetSeconds = Math.max(0, (unitTiming.start_ms || 0) / 1000);
          const shouldSeek =
            !isSameAudio ||
            audioPlayer.ended ||
            elapsedMs < unitTiming.start_ms - 90 ||
            elapsedMs >= unitTiming.end_ms - 90;

          if (!isSameAudio) {
            audioPlayer.pause();
            audioPlayer.src = segment.audio;
            audioPlayer.load();
          }
          if (shouldSeek && audioPlayer.readyState >= 1) {
            await seekAudioTo(targetSeconds);
          }
          if (!isPlaying || token !== playbackToken) return true;
          audioPlayer.playbackRate = playbackSpeed;
          audioPlayer.onended = () => finishCurrentSegment(token);
          audioPlayer.onerror = () => {
            if (!isPlaying || token !== playbackToken) return;
            playSyntheticSegment(words, token);
          };

          if (audioPlayer.paused) await audioPlayer.play();
          if (shouldSeek && Math.abs(audioPlayer.currentTime - targetSeconds) > 0.18) {
            await seekAudioTo(targetSeconds);
          }
          syncWordsFromAudio(words, unitTiming, token);
          return true;
        } catch (error) {
          console.warn(error);
          return false;
        }
      }

      function speakSegment(words, token, onBoundarySync) {
        if (!("speechSynthesis" in window)) return null;
        window.speechSynthesis.cancel();
        const text = segments[segmentIndex].de;
        const ranges = getWordRanges(text, words);
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "de-DE";
        utterance.rate = 0.9 * playbackSpeed;
        utterance.pitch = 0.95;
        utterance.onboundary = (event) => {
          if (!isPlaying || token !== playbackToken || typeof event.charIndex !== "number") return;
          const wordIndex = ranges.findIndex(
            (range, index) =>
              event.charIndex >= range.start &&
              (event.charIndex < range.end || index === ranges.length - 1),
          );
          if (wordIndex === -1) return;
          onBoundarySync();
          setCurrentWord(wordIndex);
        };
        utterance.onend = () => finishCurrentSegment(token);
        window.speechSynthesis.speak(utterance);
        return utterance;
      }

      function playSyntheticSegment(words, token) {
        let boundarySynced = false;
        const wordMs = () => Math.max(340, Math.min(540, 2600 / words.length)) / playbackSpeed;

        speakSegment(words, token, () => {
          boundarySynced = true;
          window.clearTimeout(playbackTimer);
        });

        function tick() {
          if (!isPlaying || token !== playbackToken || boundarySynced) return;
          setCurrentWord(currentWordIndex + 1);

          if (currentWordIndex < words.length - 1) {
            playbackTimer = window.setTimeout(tick, wordMs());
            return;
          }

          playbackTimer = window.setTimeout(() => finishCurrentSegment(token), wordMs());
        }

        playbackTimer = window.setTimeout(tick, 90);
      }

      function startPlayback() {
        stopHistoryPreview();
        isPlaying = true;
        playButton.classList.add("is-playing");
        playButton.setAttribute("aria-label", "Pause phrase");
        playCurrentSegment();
      }

      async function playCurrentSegment(options = {}) {
        window.clearTimeout(playbackTimer);
        window.cancelAnimationFrame(audioFrame);
        clearPlayDelayFeedback();
        playbackToken += 1;
        const token = playbackToken;
        isSpeakingEnglishTranslation = false;
        if (!options.preserveReadPass) currentSegmentReadPass = 1;
        currentWordIndex = -1;
        audioFrame = null;
        playButton.setAttribute("aria-label", "Pause phrase");
        hideTooltip();
        selectedWordIndex = null;
        updateWordClasses();

        const words = getWords(segments[segmentIndex]);
        const usingCachedAudio = await playCachedSegment(words, token);
        if (!usingCachedAudio && isPlaying && token === playbackToken) {
          playSyntheticSegment(words, token);
        }
      }

      function goToSegment(nextIndex) {
        pausePlayback();
        segmentIndex = Math.max(0, Math.min(segments.length - 1, nextIndex));
        saveReadingPosition();
        render();
      }

      function updateVoiceChip() {
        bookChipLabel.textContent = currentBookTitle;
      }

      playButton.addEventListener("click", () => {
        if (isPlaying) {
          pausePlayback();
          return;
        }
        startPlayback();
      });

      prevButton.addEventListener("click", () => goToSegment(segmentIndex - 1));
      nextButton.addEventListener("click", () => goToSegment(segmentIndex + 1));
      speedButton.addEventListener("click", cyclePlaybackSpeed);
      continuousButton.addEventListener("click", toggleContinuousPlayback);
      bookTranslationButton.addEventListener("click", () => setTranslationMode("book"));
      aiTranslationButton.addEventListener("click", () => setTranslationMode("ai"));
      readGermanButton.addEventListener("click", () => setReadAloudMode("german"));
      readBothButton.addEventListener("click", () => setReadAloudMode("both"));
      readRepeatButton.addEventListener("click", cycleReadRepeatCount);
      openingBook.addEventListener("click", () => enterReader("compact"));
      standardLayoutButton.addEventListener("click", () => chooseReaderLayout("standard"));
      compactLayoutButton.addEventListener("click", () => chooseReaderLayout("compact"));
      bookChip.addEventListener("click", toggleBookMenu);
      bookMenuHome.addEventListener("click", returnToOpening);
      bookMenuWords.addEventListener("click", openWordHistory);
      remainingEl.addEventListener("click", openToc);
      wordHistoryClose.addEventListener("click", closeWordHistory);
      wordHistorySheet.addEventListener("click", (event) => {
        if (event.target === wordHistorySheet) closeWordHistory();
      });
      tocClose.addEventListener("click", () => closeToc());
      tocSheet.addEventListener("click", (event) => {
        if (event.target === tocSheet) closeToc();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") return;
        if (bookChipWrap.classList.contains("is-menu-open")) {
          closeBookMenu(true);
        } else if (wordHistorySheet.classList.contains("is-open")) {
          closeWordHistory();
        } else if (tocSheet.classList.contains("is-open")) {
          closeToc();
        }
      });

      updateVoiceChip();
      renderBookMenu();
      updateSpeedButton();
      updateContinuousButton();
      updateReadAloudButtons();
      updateReadRepeatButton();
